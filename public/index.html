<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Business Consultant - Revenue Calculator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #D4A574 0%, #8B6F47 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        
        .tabs {
            display: flex;
            gap: 0;
            background: #f5f5f5;
            padding: 0;
            border-bottom: 2px solid #D4A574;
        }
        
        .tab-button {
            flex: 1;
            padding: 15px 20px;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #666;
            transition: all 0.3s ease;
            border-bottom: 4px solid transparent;
        }
        
        .tab-button.active {
            background: white;
            color: #D4A574;
            border-bottom-color: #D4A574;
        }
        
        .tab-button:hover {
            background: white;
        }
        
        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.3s ease;
        }
        
        .tab-content.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .target-form {
            background: linear-gradient(135deg, #f9f9f9 0%, #ffffff 100%);
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: bold;
            color: #333;
            font-size: 16px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #D4A574;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B6F47;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.3);
        }

        .calculate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D4A574 0%, #8B6F47 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .calculate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #00c853 0%, #1de9b6 100%);
            border-radius: 12px;
            text-align: center;
            color: white;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        .result-box.passed {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-value {
            font-size: 48px;
            font-weight: bold;
            margin: 15px 0;
        }

        .result-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 10px;
        }

        .result-details {
            font-size: 12px;
            opacity: 0.85;
            margin-top: 15px;
        }

        .analytics-box {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 4px solid #D4A574;
        }

        .analytics-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .analytics-item:last-child {
            border-bottom: none;
        }

        .analytics-label {
            font-weight: bold;
            color: #666;
        }

        .analytics-value {
            color: #D4A574;
            font-weight: bold;
        }

        /* EMAIL AGENT STYLES */
        .email-agent-form {
            background: linear-gradient(135deg, #f9f9f9 0%, #ffffff 100%);
            border-radius: 15px;
            padding: 30px;
            max-width: 700px;
            margin: 0 auto;
        }

        .email-textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #D4A574;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: all 0.3s ease;
        }

        .email-textarea:focus {
            outline: none;
            border-color: #8B6F47;
            box-shadow: 0 0 10px rgba(212, 165, 116, 0.3);
        }

        .analysis-result {
            margin-top: 25px;
            display: none;
        }

        .analysis-result.show {
            display: block;
            animation: slideUp 0.5s ease;
        }

        .summary-box {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            margin-bottom: 15px;
        }

        .summary-box h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .sentiment-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
        }

        .sentiment-positive { background: #4caf50; color: white; }
        .sentiment-neutral { background: #2196f3; color: white; }
        .sentiment-negative { background: #f44336; color: white; }
        .sentiment-urgent { background: #ff9800; color: white; }

        .key-points-box {
            padding: 20px;
            background: #f9f9f9;
            border-radius: 12px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
        }

        .key-points-box h3 {
            margin-bottom: 12px;
            color: #333;
        }

        .key-point-item {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #555;
        }

        .key-point-item:last-child { border-bottom: none; }

        .responses-box {
            padding: 20px;
            background: #f0f7ff;
            border-radius: 12px;
            border-left: 4px solid #D4A574;
        }

        .responses-box h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .response-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            position: relative;
        }

        .response-card:last-child { margin-bottom: 0; }

        .response-label {
            font-weight: bold;
            color: #D4A574;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .response-text {
            font-size: 14px;
            color: #444;
            line-height: 1.6;
            white-space: pre-line;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 12px;
            background: #D4A574;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background: #8B6F47;
        }

        .loading-spinner {
            text-align: center;
            padding: 30px;
            display: none;
        }

        .loading-spinner.show { display: block; }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D4A574;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 40px; margin-bottom: 10px;">🥐</div>
            <h1>Revenue Calculator</h1>
            <p>Реальні дані з Google Sheets</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(event, 'target')">
                🎯 Розрахунок
            </button>
            <button class="tab-button" onclick="switchTab(event, 'emailAgent')">
                📧 Email Агент
            </button>
        </div>

        <div id="target" class="tab-content active">
            <div class="target-form">
                <h2 style="margin-bottom: 30px; color: #333;">📊 Розрахунок виторгу</h2>

                <div class="form-group">
                    <label for="dateInput">📅 Дата</label>
                    <input type="date" id="dateInput" required>
                </div>

                <div class="form-group">
                    <label for="cityInput">📍 Місто</label>
                    <select id="cityInput" required>
                        <option value="">Завантаження міст...</option>
                    </select>
                </div>

                <button class="calculate-btn" onclick="calculateTarget()">
                    🔄 Розрахувати
                </button>

                <div id="resultBox" class="result-box">
                    <div class="result-label" id="resultLabel">Цільовий виторг</div>
                    <div class="result-value" id="resultValue">0€</div>
                    <div class="result-details" id="resultDetails"></div>
                </div>

                <div id="analyticsBox" class="analytics-box" style="display: none;">
                    <h3 style="margin-bottom: 15px; color: #333;">📈 Дані</h3>
                    <div class="analytics-item">
                        <span class="analytics-label">Попередній день:</span>
                        <span class="analytics-value" id="prevRevenue">-</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- EMAIL AGENT TAB -->
        <div id="emailAgent" class="tab-content">
            <div class="email-agent-form">
                <h2 style="margin-bottom: 10px; color: #333;">📧 Email Агент</h2>
                <p style="margin-bottom: 25px; color: #666; font-size: 14px;">
                    Вставте текст листа — агент проаналізує його, створить звіт та запропонує варіанти відповіді.
                </p>

                <div class="form-group">
                    <label for="emailText">✉️ Текст листа</label>
                    <textarea id="emailText" class="email-textarea" placeholder="Вставте текст електронного листа сюди..."></textarea>
                </div>

                <button class="calculate-btn" onclick="analyzeEmailAction()">
                    🤖 Аналізувати лист
                </button>

                <div id="emailLoading" class="loading-spinner">
                    <div class="spinner"></div>
                    <p style="color: #666;">Аналізую лист...</p>
                </div>

                <div id="analysisResult" class="analysis-result">
                    <div id="summaryBox" class="summary-box">
                        <h3>📋 Звіт</h3>
                        <p id="summaryText"></p>
                        <span id="sentimentBadge" class="sentiment-badge"></span>
                    </div>

                    <div id="keyPointsBox" class="key-points-box">
                        <h3>🔑 Ключові пункти</h3>
                        <div id="keyPointsList"></div>
                    </div>

                    <div id="responsesBox" class="responses-box">
                        <h3>💬 Варіанти відповіді</h3>
                        <div id="responsesList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        window.addEventListener('load', function() {
            const today = new Date();
            const year = today.getFullYear();
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const day = String(today.getDate()).padStart(2, '0');
            document.getElementById('dateInput').value = `${year}-${month}-${day}`;

            loadCities();
        });

        async function loadCities() {
            try {
                const response = await fetch('/api/cities');
                const cities = await response.json();

                const select = document.getElementById('cityInput');
                select.innerHTML = '<option value="">Виберіть місто...</option>';

                cities.forEach(city => {
                    const option = document.createElement('option');
                    option.value = city;
                    option.textContent = city;
                    select.appendChild(option);
                });
            } catch (error) {
                console.error('Помилка завантаження міст:', error);
            }
        }

        async function calculateTarget() {
            const dateInput = document.getElementById('dateInput').value;
            const city = document.getElementById('cityInput').value;

            if (!dateInput || !city) {
                alert('Будь ласка, виберіть дату та місто!');
                return;
            }

            const date = new Date(dateInput);
            const formattedDate = `${date.getDate().toString().padStart(2, '0')}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getFullYear()}`;

            try {
                const response = await fetch('/api/voice', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        transcript: `Розрахуй для ${formattedDate} ${city}`,
                        userId: 'user_' + Date.now(),
                        location: city,
                        date: formattedDate
                    })
                });

                const data = await response.json();

                const resultBox = document.getElementById('resultBox');
                const resultValue = document.getElementById('resultValue');
                const resultLabel = document.getElementById('resultLabel');
                const resultDetails = document.getElementById('resultDetails');
                const analyticsBox = document.getElementById('analyticsBox');

                resultValue.textContent = data.response;
                
                const dayOfWeekName = ['Неділя', 'Понеділок', 'Вівторок', 'Середа', 'Четвер', 'П\'ятниця', 'Субота'][date.getDay()];

                resultDetails.innerHTML = `<strong>${city}</strong> | ${formattedDate} | ${dayOfWeekName}`;

                // ЯКЩО ДЕНЬ УЖЕ ПРОЙШОВ
                if (data.analytics.isDayPassed) {
                    resultLabel.textContent = data.analytics.actualRevenue > 0 ? '✅ РЕАЛЬНИЙ ВИТОРГ' : '⚠️ ДАНІ ВІДСУТНІ';
                    resultBox.classList.add('passed');
                } else {
                    resultLabel.textContent = '🎯 ЦІЛЬОВИЙ ВИТОРГ';
                    resultBox.classList.remove('passed');
                }

                // ПОПЕРЕДНІЙ ДЕНЬ
                document.getElementById('prevRevenue').textContent = data.analytics.previousRevenue + '€';

                resultBox.classList.add('show');
                analyticsBox.style.display = 'block';

            } catch (error) {
                alert('❌ Помилка розрахунку');
                console.error('Помилка:', error);
            }
        }

        // ===== EMAIL AGENT =====
        async function analyzeEmailAction() {
            const emailText = document.getElementById('emailText').value;
            if (!emailText.trim()) {
                alert('Будь ласка, вставте текст листа!');
                return;
            }

            const loading = document.getElementById('emailLoading');
            const result = document.getElementById('analysisResult');
            loading.classList.add('show');
            result.classList.remove('show');

            try {
                const response = await fetch('/api/analyze-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ emailText })
                });
                const data = await response.json();

                document.getElementById('summaryText').textContent = data.summary;

                const badge = document.getElementById('sentimentBadge');
                const sentimentMap = { 'позитивний': 'positive', 'нейтральний': 'neutral', 'негативний': 'negative', 'терміновий': 'urgent' };
                badge.className = 'sentiment-badge sentiment-' + (sentimentMap[data.sentiment] || 'neutral');
                badge.textContent = data.sentiment.toUpperCase();

                const keyList = document.getElementById('keyPointsList');
                keyList.innerHTML = (data.keyPoints || []).map(p => '<div class="key-point-item">• ' + p + '</div>').join('');

                const respList = document.getElementById('responsesList');
                const labels = ['🔷 Формальна', '💛 Дружня', '⚡ Коротка'];
                respList.innerHTML = (data.suggestedResponses || []).map((r, i) =>
                    '<div class="response-card"><div class="response-label">' + (labels[i] || 'Варіант') + '</div><div class="response-text">' + r + '</div><button class="copy-btn" onclick="navigator.clipboard.writeText(this.parentElement.querySelector(\'.response-text\').textContent).then(()=>this.textContent=\'✅\')">📋 Копіювати</button></div>'
                ).join('');

                loading.classList.remove('show');
                result.classList.add('show');
            } catch (error) {
                loading.classList.remove('show');
                alert('❌ Помилка аналізу листа');
                console.error(error);
            }
        }
    </script>
</body>
</html>
